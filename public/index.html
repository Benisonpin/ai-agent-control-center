<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTE Vibe Code - AI Image Drone Chip 開發平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333; min-height: 100vh; padding: 2rem;
        }
        .container { 
            max-width: 1200px; margin: 0 auto;
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #3498db; margin-bottom: 2rem; text-align: center; }
        .status { 
            background: #2ecc71; color: white; 
            padding: 1rem; border-radius: 8px; margin: 1rem 0;
        }
        .btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white; border: none; padding: 1rem 2rem;
            border-radius: 8px; cursor: pointer; margin: 0.5rem;
            font-size: 1rem; font-weight: 600;
        }
        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚁 CTE Vibe Code - AI Image Drone Chip</h1>
        <div class="status">
            ✅ 系統已快速恢復！檔案結構重建完成。
        </div>
        <p>如果您看到這個頁面，表示快速重建腳本已成功執行。</p>
        <button class="btn" onclick="alert('系統正常運行中！')">測試按鈕</button>
        <hr style="margin: 2rem 0;">
        <h3>📁 重建的目錄結構：</h3>
        <ul>
            <li>📂 public/ - Web 介面檔案</li>
            <li>📂 stage1_training/ - 第一階段訓練腳本</li>
            <li>📂 rtl/ - FPGA HDL 程式碼</li>
            <li>📂 docs/ - 文檔資料</li>
        </ul>
    </div>
</body>
</html>
