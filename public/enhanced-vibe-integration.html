<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTE Vibe Code - 完整功能整合平台</title>
    <link rel="stylesheet" href="css/enhanced-vibe-styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 0;
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            font-size: 1.3rem;
            color: #bbb;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .version-badge {
            display: inline-block;
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            color: #fff;
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 CTE Vibe Code</h1>
            <p>AI Image Drone Chip 開發平台 - 完整的軟硬體整合解決方案</p>
            <p>整合 OTA 更新、Radiant FPGA、ModelSim 模擬、GPU 分析、無人機個性化系統</p>
            <span class="version-badge">v2.0 Enhanced Integration</span>
        </div>
    </div>
    
    <script src="js/enhanced-vibe-integration.js"></script>
</body>
</html>
